<header class="app-header">
  <div class="app-header__inner">
    <a href="/" class="app-logo" title="На главную">
      <span class="app-logo__icon">📊</span>
      <span class="app-logo__text">Дисциплина</span>
    </a>
    <nav class="app-nav">
      <a href="/" class="nav-pill" title="Главная статистика">📈 Главная</a>
      <a href="/report" class="nav-pill" title="Генератор отчёта">📝 Отчёт</a>
      <a href="/planner" class="nav-pill" title="Планировщик">🗺️ Планировщик</a>
      <a href="/tasks" class="nav-pill" title="Мелкие дела">✓ Дела</a>
      <a href="/ideas" class="nav-pill" title="Блокнот идей">💡 Идеи</a>
      <a href="/finance" class="nav-pill" title="Финансы">💰 Финансы</a>
      <a href="/biometric" class="nav-pill" title="Биометрика">❤️ Биометрика</a>
      <a href="/combinations" class="nav-pill" title="Настройка связей">⚙️ Связи</a>
      <a href="/goals" class="nav-pill" title="Цели">🎯 Цели</a>
      <a href="/skills" class="nav-pill" title="Навыки">🧠 Навыки</a>
    </nav>
  </div>
  <script>
    (function(){
      function normalizePath(path) {
        return (path || '/').replace(/\/+$|\/\/{2,}/g, '/');
      }
      var current = normalizePath(window.location.pathname);
      document.querySelectorAll('.app-nav .nav-pill').forEach(function(link){
        var href = link.getAttribute('href') || '/';
        var target = normalizePath(new URL(href, window.location.origin).pathname);
        if(target === current) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    })();
  </script>
</header>
